<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聪聪</title>
  <meta name="description" content="Java 后端开发工程师，专注支付行业与分布式系统">
  <meta name="og:title" content="聪聪">
  <meta name="og:description" content="Java 后端开发工程师，专注支付行业与分布式系统">
  <link rel="icon" href="/blog/favicon.ico">
  <style>
    :root {
      --bg: #fafafc;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #5b5b7a;
      --border: #e8e8ef;
      --accent: #2196f3;
      --accent-hover: #1976d2;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.10);
      --gradient-start: #2196f3;
      --gradient-end: #00bcd4;
    }

    html[data-theme="dark"] {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.20);
      --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.35);
      --gradient-start: #58a6ff;
      --gradient-end: #3fb950;
    }

    html { color-scheme: light; }
    html[data-theme="dark"] { color-scheme: dark; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1.25rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      transform: scale(1.08);
      box-shadow: var(--shadow-hover);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .avatar-ring {
      display: inline-block;
      padding: 4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .hero .bio {
      color: var(--text-secondary);
      font-size: 0.9rem;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* Navigation cards */
    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.125rem 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    .nav-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .nav-card .icon-wrapper {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #fff;
      flex-shrink: 0;
    }

    .nav-card .card-body {
      flex: 1;
    }

    .nav-card .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.15rem;
    }

    .nav-card .card-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .nav-card .arrow {
      color: var(--text-secondary);
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .nav-card:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Social links */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .social-link {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1.15rem;
      transition: color 0.2s, background 0.2s;
    }

    .social-link:hover {
      color: var(--accent);
      background: var(--card-bg);
    }

    /* Footer */
    .footer {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 2.5rem 1rem 2rem;
      }
      .hero h1 {
        font-size: 1.6rem;
      }
      .nav-card {
        padding: 1rem 1.25rem;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">&#9788;</button>

  <div class="container">
    <!-- Hero -->
    <section class="hero">
      <div class="avatar-ring">
        <img class="avatar" src="/blog/favicon.png" alt="头像">
      </div>
      <h1>聪聪</h1>
      <p class="tagline">Java 后端开发工程师</p>
      <p class="bio">专注支付行业与分布式系统，热爱技术分享与开源。这里是我的个人主页和技术博客入口。</p>
    </section>

    <!-- Navigation -->
    <nav class="nav-section">
      <a class="nav-card" href="/blog/">
        <div class="icon-wrapper">&#128214;</div>
        <div class="card-body">
          <div class="card-title">技术博客</div>
          <div class="card-desc">Java · 支付 · 分布式 · 面试经验</div>
        </div>
        <span class="arrow">&#8594;</span>
      </a>

      <a class="nav-card" href="https://github.com/ccoderJava" target="_blank" rel="noopener">
        <div class="icon-wrapper">&#9733;</div>
        <div class="card-body">
          <div class="card-title">GitHub</div>
          <div class="card-desc">开源项目与代码片段</div>
        </div>
        <span class="arrow">&#8599;</span>
      </a>
    </nav>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2021–2026 聪聪</p>
      <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">鄂ICP备2021021487号-1</a></p>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'vuepress-theme-hope-scheme';
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    function setTheme(dark) {
      html.dataset.theme = dark ? 'dark' : 'light';
      toggle.innerHTML = dark ? '&#9789;' : '&#9788;';
    }

    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored === 'dark') setTheme(true);
    else if (stored === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme(true);

    toggle.addEventListener('click', () => {
      const dark = html.dataset.theme !== 'dark';
      setTheme(dark);
      localStorage.setItem(STORAGE_KEY, dark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
