<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聪聪</title>
  <meta name="description" content="Java 后端开发工程师，专注支付行业与分布式系统">
  <link rel="icon" href="/blog/favicon.ico">
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c3e50;
      --muted: #6a8bad;
      --accent: #2196f3;
      --card-bg: #f8f9fa;
      --card-border: #eaecef;
    }
    html[data-theme="dark"] {
      --bg: #1a1b1e;
      --text: #e4e6eb;
      --muted: #b0b3b8;
      --accent: #64b5f6;
      --card-bg: #242526;
      --card-border: #3a3b3d;
    }
    html { color-scheme: light; }
    html[data-theme="dark"] { color-scheme: dark; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .title {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    a.card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    a.card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }

    .card-icon {
      font-size: 1.25rem;
      width: 1.5rem;
      text-align: center;
    }

    .card-label {
      font-weight: 500;
    }

    .card-hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1.25rem;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .theme-toggle:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    footer {
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="切换主题">&#9788;</button>

  <main>
    <div class="avatar">&#9998;</div>
    <h1>聪聪</h1>
    <p class="title">Java 后端开发工程师 &middot; 支付行业 &middot; 分布式系统</p>

    <div class="links">
      <a class="card" href="/blog/">
        <span class="card-icon">&#128214;</span>
        <span class="card-label">技术博客</span>
        <span class="card-hint">blog.ccoder.cc</span>
      </a>
      <a class="card" href="https://github.com/ccoderJava" target="_blank" rel="noopener">
        <span class="card-icon">&#9906;</span>
        <span class="card-label">GitHub</span>
      </a>
    </div>

    <footer>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">鄂ICP备2021021487号-1</a>
    </footer>
  </main>

  <script>
    const STORAGE_KEY = 'vuepress-theme-hope-scheme';
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    function setTheme(dark) {
      html.dataset.theme = dark ? 'dark' : 'light';
      toggle.innerHTML = dark ? '&#9789;' : '&#9788;';
    }

    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored === 'dark') setTheme(true);
    else if (stored === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme(true);

    toggle.addEventListener('click', () => {
      const dark = html.dataset.theme !== 'dark';
      setTheme(dark);
      localStorage.setItem(STORAGE_KEY, dark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
